baseURL = "https://jfwooten4.com"
theme = "hugo-bearblog"

title = "John Wooten"
author = "john.xlm"
copyright = "CC BY-SA 4.0"
languageCode = "en-US"
enableRobotsTXT = true

# Generate "Bearblog"-like URLs !only!, see https://bearblog.dev/.
disableKinds = ["taxonomy"]
ignoreErrors = ["error-disable-taxonomy"]

[module]
  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = ".generated-content/micro"
    target = "content/micro"
  [[module.mounts]]
    source = "micro/2024/Aug/imgs"
    target = "static/micro/2024/aug/imgs"
  [[module.mounts]]
    source = "static"
    target = "static"

[permalinks]
  micro = "/:slug/"
  tags = "/blog/:slug"

[params]
  title = "Free Markets"
  description = "Taking our environment by the steering wheeel. 💜"
  favicon = "favicon.ico"
  images = ["icon.png"]
  
  hideMadeWithLine = true
  enablePostNavigator = true
  dateFormat = "2 Jan 06"
  mainSections = ["micro"]


# Configure https://gohugo.io/configuration/markup/#highlight
[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.typographer]
        disable = true
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'friendly'
    lineNos = true
    lineNumbersInTable = false
    codeFences = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]
