baseURL = "https://john.lgbt"
theme = "hugo-bearblog"

title = ""
author = "masculine@john.lgbt"
copyright = "CC BY-SA 4.0"
languageCode = "en-US"

# Generate a nice robots.txt for SEO
enableRobotsTXT = false

# Generate "Bearblog"-like URLs !only!, see https://bearblog.dev/.
disableKinds = ["taxonomy"]
ignoreErrors = ["error-disable-taxonomy"]
[permalinks]
  blog = "/:slug/"
  tags = "/blog/:slug"

[params]
  title = "JCRS"
  description = "Taking our environment by the steering wheeel. 💜"
  favicon = "favicon.ico"
  images = ["tricky-canon.jpg"]
  
  hideMadeWithLine = true
  enablePostNavigator = true
  dateFormat = "Mon Jan 2 06"
  mainSections = ["micro"]


# Configure markup highlighter to match "Bearblog" aesthetics
# see https://gohugo.io/configuration/markup/#highlight
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'friendly'
    lineNos = true
    lineNumbersInTable = false
    codeFences = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  page = ["HTML"]

[module]
  [[module.mounts]]
    source = "archetypes"
    target = "archetypes"
  [[module.mounts]]
    source = "layouts"
    target = "layouts"
  [[module.mounts]]
    source = "static"
    target = "static"
  [[module.mounts]]
    source = "posts"
    target = "content/posts"
  [[module.mounts]]
    source = "micro"
    target = "content/micro"
  [[module.mounts]]
    source = "macro"
    target = "content/macro"
  [[module.mounts]]
    source = "group"
    target = "content/group"
